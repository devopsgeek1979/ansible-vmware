---
- name: Linux patching and compliance demo
  hosts: managed_linux
  gather_facts: true

  tasks:
    - name: Update package metadata (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
      when: ansible_facts.os_family == "Debian"

    - name: Upgrade packages (Debian/Ubuntu)
      ansible.builtin.apt:
        upgrade: dist
      when: ansible_facts.os_family == "Debian"

    - name: Upgrade packages (RHEL/CentOS/Rocky/Alma)
      ansible.builtin.dnf:
        name: "*"
        state: latest
      when: ansible_facts.os_family == "RedHat"

    - name: Ensure security baseline packages
      ansible.builtin.package:
        name:
          - audit
          - rsyslog
          - sudo
        state: present
